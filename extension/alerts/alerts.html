<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Rugscope Wallet Alerts</title>
    <link rel="stylesheet" href="alerts.css">
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div class="brand">
          <img src="../assets/icon48.png" alt="">
          <div>
            <p>Rugscope</p>
            <h1>Wallet Alerts</h1>
          </div>
        </div>
        <div class="actions">
          <button id="refreshButton" type="button">Refresh</button>
          <button id="clearButton" type="button">Clear</button>
        </div>
      </header>

      <section class="summary">
        <div>
          <span>Total alerts</span>
          <strong id="alertCount">0</strong>
        </div>
        <div>
          <span>Latest alert</span>
          <strong id="latestAlert">None</strong>
        </div>
      </section>

      <section class="alerts" id="alerts"></section>
      <section class="empty hidden" id="emptyState">
        <img src="../assets/icon48.png" alt="">
        <p>No tracked wallet alerts yet.</p>
      </section>
    </main>
    <script src="alerts.js"></script>
  </body>
</html>
